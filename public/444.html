<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
		<title>Online Courses for College Credit, Exam Prep &amp; K-12 | Study.com</title>
		<meta name="robots" content="noindex, nofollow" />
		<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
		  background: #000;
		  min-height: 100vh;
		  font-family: "Roboto", Arial, sans-serif;
		  overflow: hidden;
		}

		/* Starfield */
		#starfield {
		  position: fixed;
		  top: 0; left: 0;
		  width: 100%; height: 100%;
		  z-index: 0;
		  pointer-events: none;
		}

		/* Top-left 404 text block */
		#top-left {
		  position: fixed;
		  top: 32px;
		  left: 36px;
		  z-index: 1;
		}

		#top-left h1 {
		  color: #fff;
		  font-size: 28px;
		  font-weight: 700;
		  letter-spacing: 0.02em;
		  margin-bottom: 10px;
		  line-height: 1.2;
		}

		#top-left p {
		  color: rgba(255,255,255,0.65);
		  font-size: 14px;
		  max-width: 380px;
		  line-height: 1.6;
		}

		/* Center-bottom red message */
		#center-msg {
		  position: fixed;
		  bottom: 80px;
		  left: 50%;
		  transform: translateX(-50%);
		  z-index: 1;
		  text-align: center;
		  color: #e83333;
		  font-size: 15px;
		  font-weight: 600;
		  letter-spacing: 0.04em;
		  white-space: nowrap;
		}

		/* Bottom-right branding */
		#branding {
		  position: fixed;
		  bottom: 24px;
		  right: 28px;
		  z-index: 1;
		  color: #4a8fff;
		  font-size: 13px;
		  font-weight: 700;
		  letter-spacing: 0.12em;
		}
		</style>
	</head>
	<body>
		<canvas id="starfield"></canvas>

		<div id="top-left">
			<h1>444 Forbidden</h1>
			<p>The path you have reached is forbidden and cannot be accessed by the public.</p>
			<p style="margin-top:8px;">look somewhere else</p>
		</div>

		<div id="center-msg">look somewhere else BETA</div>

		<div id="branding">FISH PROXY</div>

		<script>
		(function () {
		  const canvas = document.getElementById("starfield");
		  const ctx    = canvas.getContext("2d");
		  const COUNT  = 180;
		  const SPEED  = 0.25;
		  let stars    = [];
		  let resizeTimer = null;

		  function mkStar() {
		    return {
		      x:          Math.random() * canvas.width,
		      y:          Math.random() * canvas.height,
		      r:          Math.random() * 1.4 + 0.3,
		      opacity:    Math.random() * 0.6 + 0.2,
		      phase:      Math.random() * Math.PI * 2,
		      phaseSpeed: Math.random() * 0.015 + 0.005
		    };
		  }

		  function init() {
		    canvas.width  = window.innerWidth;
		    canvas.height = window.innerHeight;
		    stars = Array.from({ length: COUNT }, mkStar);
		  }

		  function resize() {
		    clearTimeout(resizeTimer);
		    resizeTimer = setTimeout(function () {
		      canvas.width  = window.innerWidth;
		      canvas.height = window.innerHeight;
		      ctx.clearRect(0, 0, canvas.width, canvas.height);
		      stars = Array.from({ length: COUNT }, mkStar);
		    }, 80);
		  }

		  function draw() {
		    ctx.clearRect(0, 0, canvas.width, canvas.height);
		    for (const s of stars) {
		      s.y += SPEED;
		      if (s.y > canvas.height + 2) { s.y = -2; s.x = Math.random() * canvas.width; }
		      s.phase += s.phaseSpeed;
		      const a = s.opacity * (0.7 + 0.3 * Math.sin(s.phase));
		      ctx.beginPath();
		      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
		      ctx.fillStyle = `rgba(255,255,255,${a})`;
		      ctx.fill();
		    }
		    requestAnimationFrame(draw);
		  }

		  window.addEventListener("resize", resize);
		  init();
		  requestAnimationFrame(draw);
		})();
		</script>
	</body>
</html>
