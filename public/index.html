<!doctype html>
<html>
	<head>
		<script>
		(function() {
		    document.title = "Study.com | free Online Courses, Lessons & Practice";
		    const iconUrl = "https://study.com/favicon.ico";
		    let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
		    link.type = 'image/x-icon';
		    link.rel = 'shortcut icon';
		    link.href = iconUrl;
		    document.head.appendChild(link);

		    const metaTags = [
		        { name: "description", content: "Take online courses on Study.com that are fun and effective. Help your kids with their biology and math homework." },
		        { name: "keywords", content: "education, flashcards, study, math, help, biology, science lessons" },
		        { name: "theme-color", content: "#ffffff" }
		    ];

		    metaTags.forEach(tag => {
		        let element = document.querySelector(`meta[name="${tag.name}"]`) || document.createElement('meta');
		        element.name = tag.name;
		        element.content = tag.content;
		        document.head.appendChild(element);
		    });
		})();
		</script>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Fish Proxy | Powerful Web Proxy</title>
		<meta
			name="description"
			content="Fish Proxy is a powerful web proxy powered by proxy engines ultraviolet and scramjet, great UI and features."
		/>
		<meta
			name="keywords"
			content="proxy, web proxy, ultraviolet, scramjet, service workers, unblock websites, unblock chromebook, free web proxy, proxy list, proxy sites, online proxy, proxy server, bypass securly, bypass iboss, bypass lightspeed filter, unblock youtube"
		/>
		<meta
			name="theme-color"
			media="(prefers-color-scheme: dark)"
			content="#000000"

		<link rel="stylesheet" href="index.css" />

		<script src="baremux/index.js"></script>
		<script src="uv/uv.bundle.js"></script>
		<script src="uv/uv.config.js"></script>
		<script src="/scram/scramjet.all.js"></script>
	</head>

	<body>
		<!-- Starfield sits behind everything -->
		<canvas id="starfield"></canvas>

		<!-- Main homepage content -->
		<div class="home-center" id="home-center">
			<div class="flex-center logo-wrapper">
				<img class="logo" src="images/Fish%20Proxy%20logo.png" alt="Fish Proxy" />
			</div>

			<div class="flex-center desc">
				<p>
					Fish Proxy is a powerful web proxy powered by proxy engines ultraviolet
					and scramjet, great UI and features.
				</p>
			</div>

			<form id="uv-form" class="flex-center">
				<input
					id="uv-search-engine"
					value="https://duckduckgo.com/?q=%s"
					type="hidden"
				/>
				<input id="uv-address" type="text" placeholder="Search the web freely" />

			<div class="desc">

			</div>
		</div>

		<iframe style="display: none" id="uv-frame"></iframe>
		<script src="register-sw.js"></script>
		<script src="search.js"></script>
		<script src="index.js"></script>

		<!-- Proxy selector: bottom-right corner, home page only -->
		<div id="proxy-picker">
			<span class="proxy-option" id="pick-uv">
				ultraviolet <span class="proxy-dot" id="dot-uv"></span>
			</span>
			<span class="proxy-option" id="pick-sj">
				scramjet <span class="proxy-dot" id="dot-sj"></span>
			</span>
		</div>

		<!-- Browser console -->
		<div id="browser-console" class="browser-console">
		  <div class="console-idle">browser console</div>
		  <div class="console-controls">
		    <button id="nav-back" title="Back">◀</button>
		    <button id="nav-forward" title="Forward">▶</button>
		    <input id="console-url" type="text" placeholder="URL">
		    <button id="console-go" title="Go">Go</button>
		    <button id="console-home" title="Home">
		      <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
		        <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/>
		      </svg>
		    </button>
		    <button id="console-reload" title="Reload">⟳</button>
		  </div>
		</div>

		<style>
		/* Starfield */
		#starfield {
		  position: fixed;
		  top: 0; left: 0;
		  width: 100%; height: 100%;
		  z-index: 0;
		  pointer-events: none;
		}

		/* Home center */
		.home-center {
		  position: relative;
		  z-index: 1;
		  display: flex;
		  flex-direction: column;
		  align-items: center;
		  justify-content: center;
		  min-height: 100vh;
		  padding: 24px 16px;
		  box-sizing: border-box;
		  transition: opacity .15s ease;
		}

		/* Hide home UI when a proxy frame is active */
		.home-center.hidden {
		  opacity: 0;
		  pointer-events: none;
		}

		/* Logo */
		.logo-wrapper { margin-bottom: 20px; }

		.logo {
		  width: auto;
		  max-width: 540px;
		  height: auto;
		  max-height: 170px;
		  object-fit: contain;
		}

		/* Description */
		.desc { display: flex; justify-content: center; }

		.desc p {
		  max-width: 460px;
		  text-align: center;
		  color: rgba(255, 255, 255, 0.55);
		  font-size: 14px;
		  line-height: 1.65;
		  margin: 0 0 4px;
		}

		/* Search form */
		#uv-form { margin-top: 14px; margin-bottom: 6px; }

		/* Proxy picker */
		#proxy-picker {
		  position: fixed;
		  bottom: 18px; right: 20px;
		  display: flex;
		  align-items: center;
		  gap: 16px;
		  background: rgba(0,0,0,0.72);
		  backdrop-filter: blur(10px);
		  -webkit-backdrop-filter: blur(10px);
		  border: 1px solid rgba(255,255,255,0.1);
		  border-radius: 999px;
		  padding: 8px 18px;
		  z-index: 9998;
		  opacity: 1;
		  transition: opacity .3s ease, transform .3s ease;
		}

		#proxy-picker.hidden {
		  opacity: 0;
		  transform: translateY(6px);
		  pointer-events: none;
		}

		.proxy-option {
		  display: flex;
		  align-items: center;
		  gap: 7px;
		  font-family: "Roboto", Arial, sans-serif;
		  font-size: 11px;
		  letter-spacing: .05em;
		  color: rgba(255,255,255,0.45);
		  cursor: pointer;
		  user-select: none;
		  transition: color .15s ease;
		  white-space: nowrap;
		}

		.proxy-option:hover { color: rgba(255,255,255,0.8); }
		.proxy-option.active { color: #fff; }

		.proxy-dot {
		  width: 10px; height: 10px;
		  border-radius: 50%;
		  border: 1.5px solid rgba(255,255,255,0.3);
		  background: transparent;
		  display: inline-block;
		  flex-shrink: 0;
		  transition: background .2s ease, border-color .2s ease, box-shadow .2s ease;
		}

		.proxy-dot.active {
		  background: #4a8fff;
		  border-color: #4a8fff;
		  box-shadow: 0 0 6px rgba(74,143,255,0.6);
		}

		/* Browser console */
		.browser-console {
		  position: fixed;
		  bottom: 8px; left: 50%;
		  transform: translateX(-50%);
		  background: rgba(0,0,0,0.88);
		  backdrop-filter: blur(6px);
		  border-radius: 999px;
		  display: none;
		  z-index: 9999;
		  overflow: hidden;
		  box-shadow: 0 4px 18px rgba(0,0,0,0.4);
		  transition: all .25s ease;
		}

		.console-idle {
		  padding: 10px 26px;
		  color: white; font-size: 12px;
		  letter-spacing: .6px;
		  text-transform: lowercase;
		  cursor: pointer; opacity: 0.85;
		  transition: all .25s ease;
		}

		.console-idle:hover { opacity: 1; }

		.console-controls {
		  display: none;
		  align-items: center;
		  gap: 6px; padding: 6px 10px;
		  animation: fadeIn .2s ease;
		}

		.browser-console.active .console-idle  { display: none; }
		.browser-console.active .console-controls { display: flex; }

		.browser-console button {
		  width: 30px; height: 30px;
		  border-radius: 50%; border: none;
		  background: #111; color: white;
		  cursor: pointer; font-size: 13px;
		  display: flex; align-items: center;
		  justify-content: center;
		  transition: all .15s ease;
		}

		.browser-console button:hover {
		  background: #222;
		  transform: scale(1.08);
		}

		.browser-console input {
		  height: 28px; width: 140px;
		  border-radius: 999px; border: none;
		  padding: 0 12px; background: #000;
		  color: white; font-size: 12px;
		  transition: width .2s ease;
		}

		.browser-console.active input { width: 180px; }

		@keyframes fadeIn {
		  from { opacity: 0; transform: translateY(6px); }
		  to   { opacity: 1; transform: translateY(0); }
		}
		</style>

		<script>
		// ── Starfield ─────────────────────────────────────────────────────────
		(function () {
		  const canvas = document.getElementById("starfield");
		  const ctx    = canvas.getContext("2d");
		  const COUNT  = 180;
		  const SPEED  = 0.25;
		  let stars    = [];

		  function resize() {
		    canvas.width  = window.innerWidth;
		    canvas.height = window.innerHeight;
		  }

		  function mkStar() {
		    return {
		      x:          Math.random() * canvas.width,
		      y:          Math.random() * canvas.height,
		      r:          Math.random() * 1.4 + 0.3,
		      opacity:    Math.random() * 0.6 + 0.2,
		      phase:      Math.random() * Math.PI * 2,
		      phaseSpeed: Math.random() * 0.015 + 0.005
		    };
		  }

		  function init() { resize(); stars = Array.from({ length: COUNT }, mkStar); }

		  function draw() {
		    ctx.clearRect(0, 0, canvas.width, canvas.height);
		    for (const s of stars) {
		      s.y += SPEED;
		      if (s.y > canvas.height + 2) { s.y = -2; s.x = Math.random() * canvas.width; }
		      s.phase += s.phaseSpeed;
		      const a = s.opacity * (0.7 + 0.3 * Math.sin(s.phase));
		      ctx.beginPath();
		      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
		      ctx.fillStyle = `rgba(255,255,255,${a})`;
		      ctx.fill();
		    }
		    requestAnimationFrame(draw);
		  }

		  window.addEventListener("resize", resize);
		  init();
		  requestAnimationFrame(draw);
		})();

		// ── Home center show/hide helpers ─────────────────────────────────────
		const homeCenter = document.getElementById("home-center");

		function hideHome() {
		  homeCenter.classList.add("hidden");
		}

		function showHome() {
		  homeCenter.classList.remove("hidden");
		}

		// ── Proxy picker ──────────────────────────────────────────────────────
		const proxyPicker = document.getElementById("proxy-picker");
		const pickUV = document.getElementById("pick-uv");
		const pickSJ = document.getElementById("pick-sj");
		const dotUV  = document.getElementById("dot-uv");
		const dotSJ  = document.getElementById("dot-sj");

		function updatePickerUI(name) {
		  const isUV = name === "uv";
		  pickUV.classList.toggle("active", isUV);
		  pickSJ.classList.toggle("active", !isUV);
		  dotUV.classList.toggle("active", isUV);
		  dotSJ.classList.toggle("active", !isUV);
		}

		pickUV.addEventListener("click", () => {
		  if (typeof setProxy === "function") setProxy("uv");
		  updatePickerUI("uv");
		});

		pickSJ.addEventListener("click", () => {
		  if (typeof setProxy === "function") setProxy("sj");
		  updatePickerUI("sj");
		});

		updatePickerUI(localStorage.getItem("proxy-choice") || "sj");

		// ── Hide home + picker when proxy frame becomes active ────────────────
		const uvFrame = document.getElementById("uv-frame");

		if (uvFrame) {
		  uvFrame.addEventListener("load", () => {
		    const isHome = !uvFrame.src || uvFrame.src === "about:blank";
		    proxyPicker.classList.toggle("hidden", !isHome);
		    if (isHome) showHome(); else hideHome();
		  });
		}

		// Watch for SJ frame being appended
		new MutationObserver(() => {
		  const sjFrame = document.getElementById("sj-frame");
		  if (sjFrame) {
		    proxyPicker.classList.add("hidden");
		    hideHome();
		  }
		}).observe(document.body, { childList: true });

		// ── Browser console ───────────────────────────────────────────────────
		const consoleBar   = document.getElementById("browser-console");
		const consoleIdle  = document.querySelector(".console-idle");
		const consoleInput = document.getElementById("console-url");

		if (uvFrame) {
		  uvFrame.addEventListener("load", () => {
		    const isHome = !uvFrame.src || uvFrame.src === "about:blank";
		    consoleBar.style.display = isHome ? "none" : "block";
		    consoleBar.classList.remove("active");
		  });
		}

		let consoleLeaveTimer;
		consoleBar.addEventListener("mouseenter", () => {
		  clearTimeout(consoleLeaveTimer);
		  consoleBar.classList.add("active");
		});
		consoleBar.addEventListener("mouseleave", () => {
		  consoleLeaveTimer = setTimeout(() => consoleBar.classList.remove("active"), 400);
		});
		consoleIdle.addEventListener("click", () => consoleBar.classList.add("active"));

		document.getElementById("nav-back").onclick       = () => { try { uvFrame.contentWindow.history.back();    } catch(e) {} };
		document.getElementById("nav-forward").onclick    = () => { try { uvFrame.contentWindow.history.forward(); } catch(e) {} };
		document.getElementById("console-reload").onclick = () => { try { uvFrame.contentWindow.location.reload(); } catch(e) {} };

		function consoleNavigate() {
		  const url = consoleInput.value.trim();
		  if (!url) return;
		  const addressBar = document.querySelector("#uv-address");
		  const form = addressBar?.closest("form");
		  if (addressBar && form) { addressBar.value = url; form.requestSubmit(); }
		}

		document.getElementById("console-go").onclick = consoleNavigate;

		consoleInput.addEventListener("keydown", (e) => {
		  if (e.key === "Enter") consoleNavigate();
		});

		document.getElementById("console-home").onclick = () => {
		  if (uvFrame) uvFrame.src = "about:blank";
		  consoleBar.style.display = "none";
		  const sjFrame = document.getElementById("sj-frame");
		  if (sjFrame) sjFrame.remove();
		  proxyPicker.classList.remove("hidden");
		  showHome();
		  window.location.href = "/";
		};
		</script>

	</body>
</html>
