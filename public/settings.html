<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | Fish Proxy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    color: white;
    background: linear-gradient(180deg, #3c7be0 0%, #1a3a8a 100%);
    position: relative;
}

/* BACK BUTTON */
.back-btn {
    position: fixed;
    top: 18px;
    left: 24px;
    font-size: 18px;
    font-weight: 600;
    text-decoration: none;
    color: white;
    letter-spacing: 2px;
    transition: transform 0.25s ease, text-shadow 0.25s ease;
    z-index: 9999;
}

.back-btn:hover {
    transform: scale(1.18);
    text-shadow: 0 0 14px rgba(255,255,255,0.85);
}

/* STARS */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(255,255,255,0.5);
    animation: drift linear infinite;
}

@keyframes drift {
    from { transform: translateY(0px); }
    to { transform: translateY(-120vh); }
}

/* PAGE */
.page {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.settings-card {
    width: 500px; /* Bigger card */
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    padding: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.settings-card h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
    letter-spacing: 2px;
}

/* SETTING ROW */
.setting {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.setting span {
    font-size: 16px;
    font-weight: 600;
}

/* TOGGLE */
.switch {
    position: relative;
    width: 55px;
    height: 28px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    cursor: pointer;
    background-color: #888;
    border-radius: 34px;
    width: 100%;
    height: 100%;
    transition: .4s;
}

.slider:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 3px;
    top: 3px;
    background-color: white;
    border-radius: 50%;
    transition: .4s;
}

input:checked + .slider {
    background-color: #5c8ed6;
}

input:checked + .slider:before {
    transform: translateX(27px);
}
</style>
</head>

<body>

<a href="/" class="back-btn">HOME</a>

<div class="stars" id="stars"></div>

<div class="page">
    <div class="settings-card">
        <h1>SETTINGS</h1>

        <div class="setting">
            <span>Enable Moving Stars</span>
            <label class="switch">
                <input type="checkbox" id="starsToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting">
            <span>Enable Tab Clock</span>
            <label class="switch">
                <input type="checkbox" id="clockToggle">
                <span class="slider"></span>
            </label>
        </div>

    </div>
</div>

<script>
/* Generate Moving Stars */
const starContainer = document.getElementById("stars");
for (let i = 0; i < 350; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDuration = (20 + Math.random() * 20) + "s";
    starContainer.appendChild(star);
}

/* SETTINGS LOGIC */
const starsToggle = document.getElementById("starsToggle");
const clockToggle = document.getElementById("clockToggle");

/* Load saved settings */
starsToggle.checked = localStorage.getItem("stars") !== "false";
clockToggle.checked = localStorage.getItem("tabClock") === "true";

/* Save changes */
starsToggle.addEventListener("change", () => {
    localStorage.setItem("stars", starsToggle.checked);
});

clockToggle.addEventListener("change", () => {
    localStorage.setItem("tabClock", clockToggle.checked);
});
</script>

</body>
</html>
